name: Build BlockBard

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew clean build --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockbard-mod-jar
          path: build/libs/blockbard-*.jar
          if-no-files-found: error

      - name: Verify JAR is non-empty
        run: |
          JAR=$(ls build/libs/blockbard-*.jar | grep -v sources | grep -v dev | head -1)
          SIZE=$(stat -c%s "$JAR")
          echo "JAR size: $SIZE bytes"
          [ "$SIZE" -gt 10000 ] || (echo "JAR too small, build likely failed" && exit 1)
